name: onix_flutter_core
description: Onix Flutter Core — a robust networking, storage, and infrastructure layer for scalable Flutter applications.
version: 1.0.0
repository: https://github.com/fakhry-alnaffar/onix-flutter-core
publish_to: none

topics:
  - networking
  - dio
  - storage
  - architecture
  - core

environment:
  sdk: ^3.12.0
  flutter: ^3.44.0

dependencies:
  flutter:
    sdk: flutter

  connectivity_plus: ^7.1.1
  dio: ^5.9.2
  dio_cache_interceptor: ^4.0.6
  flutter_secure_storage: ^10.3.1
  pretty_dio_logger: ^1.4.0
  retry: ^3.1.2
  shared_preferences: ^2.5.5
  internet_connection_checker_plus: ^3.0.1

  onix_flutter_core_models:
    git:
      url: https://github.com/fakhry-alnaffar/onix-flutter-core-models.git
      ref: main

dev_dependencies:
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  mockito: ^5.7.0
  test: ^1.31.1
  connectivity_plus_platform_interface: ^2.1.0